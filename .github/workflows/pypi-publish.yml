name: Publish to PyPI

run-name: Publish ${{ inputs.tag || github.event.release.tag_name }} to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated release tag to build and publish
        required: true
        type: string
        default: v2.0.0

permissions:
  contents: read

concurrency:
  group: pypi-publish
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

jobs:
  build:
    name: Build release distributions
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid release tag::$RELEASE_TAG must use vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify annotated tag checkout
        shell: bash
        run: |
          if ! git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "::error title=Missing release tag::refs/tags/$RELEASE_TAG was not fetched"
            exit 1
          fi
          if [[ "$(git cat-file -t "$RELEASE_TAG")" != "tag" ]]; then
            echo "::error title=Unannotated release tag::$RELEASE_TAG must be an annotated tag"
            exit 1
          fi
          if [[ "$(git rev-parse "$RELEASE_TAG^{}")" != "$(git rev-parse HEAD)" ]]; then
            echo "::error title=Tag checkout mismatch::$RELEASE_TAG does not resolve to HEAD"
            exit 1
          fi
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error title=Unmerged release tag::$RELEASE_TAG is not in the main branch history"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'build>=1.2,<2' 'twine>=6,<7'

      - name: Verify package version matches tag
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          version = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          expected_tag = f"v{version}"
          actual_tag = os.environ["RELEASE_TAG"]
          if actual_tag != expected_tag:
              raise SystemExit(
                  f"release tag {actual_tag!r} does not match package version {version!r}"
              )
          PY

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Upload distributions for publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions with OIDC
    needs:
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/pronunciation-mapper
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          print-hash: true
